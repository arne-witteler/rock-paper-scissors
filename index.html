<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock, Paper, Scissors</title>
    <script defer src="script.js"></script>
    <link rel="stylesheet" href="styles/styles.css">
  </head>
  <body>
    <main class="game-container">

      <section id="start-screen" class="screen screen--start">
        <img src="assets/rock-paper-scissors.png" alt="Rock, Paper, Scissors Icon" class="screen__image">
        <h1 class="screen__title">RPS: 5 Rounds</h1>
        <p class="screen__text">Best of five wins the game</p>
        <button id="start-game-button" class="screen__button screen__button--primary">Start Game</button>
      </section>

      <section id="game-screen" class="screen screen--game hidden">
        <div class="screen__header">
          <p class="screen__rounds">Round <span id="current-round">1</span> of 5</p>
          <p class="screen__score">You: <span id="player-score">0</span> | CPU: <span id="computer-score">0</span></p>
        </div>

        <p class="screen__message visible">CHOOSE YOUR WEAPON</p>

        <div class="screen__battle-zone">
          <div class="screen__player-choice">
            <p class="screen__choice-label">Your Choice</p>
            <img src="" alt="" id="player-choice-img" class="screen__choice-image">
          </div>
          <div class="screen__computer-choice">
            <p class="screen__choice-label">CPU Choice</p>
            <img src="" alt="" id="computer-choice-img" class="screen__choice-image">
          </div>
        </div>

        <div class="screen__buttons">
          <button id="rock-button" class="screen__button screen__button--choice" data-choice="rock">
            Rock
            <img src="assets/hand-rock.svg" alt="Rock Icon" class="screen__button-icon">
          </button>
          <button id="paper-button" class="screen__button screen__button--choice" data-choice="paper">
            Paper
            <img src="assets/hand-paper.svg" alt="Paper Icon" class="screen__button-icon">
          </button>
          <button id="scissors-button" class="screen__button screen__button--choice" data-choice="scissors">
            Scissors
            <img src="assets/hand-scissors.svg" alt="Scissors Icon" class="screen__button-icon">
          </button>
        </div>
      </section>

      <section id="end-screen" class="screen screen--end hidden">
        <div class="screen__wrapper">
          <h2 id="game-result-title" class="screen__title">Game Over!</h2>
          <p id="game-over-text" class="screen__text"></p>

          <div class="screen__final-score-box">
            <p class="screen__final-score-label">Final Score</p>
            <p class="screen__final-score-value">You: <span id="final-player-score">0</span> | CPU: <span id="final-computer-score">0</span></p>
          </div>

          <button id="play-again-button" class="screen__button screen__button--primary">Play Again</button>
          <button id="main-menu-button" class="screen__button screen__button--secondary">Main Menu</button>
        </div>
      </section>

    </main>
  </body>
</html>
